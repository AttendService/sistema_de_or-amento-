services:
  # ── PostgreSQL ───────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: orcamentos-db
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${POSTGRES_DB:-orcamentos_db}
      POSTGRES_USER:     ${POSTGRES_USER:-orcamentos_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD obrigatória}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/prisma/migrations/001_initial_schema.sql:/docker-entrypoint-initdb.d/001_schema.sql
      - ./backend/prisma/migrations/002_seed.sql:/docker-entrypoint-initdb.d/002_seed.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-orcamentos_user} -d ${POSTGRES_DB:-orcamentos_db}"]
      interval: 10s
      timeout:  5s
      retries:  5

  # ── Redis ─────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: orcamentos-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout:  5s
      retries:  5

  # ── Backend ───────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: orcamentos-backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-orcamentos_user}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD obrigatória}@postgres:5432/${POSTGRES_DB:-orcamentos_db}
      REDIS_URL:    redis://redis:6379
      JWT_SECRET:   ${JWT_SECRET:?JWT_SECRET obrigatória}
      NODE_ENV:     ${NODE_ENV:-production}
      PORT:         3000
      HOST:         0.0.0.0
      CORS_ORIGIN:  ${CORS_ORIGIN:-http://localhost}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "node -e \"const http=require('node:http');const req=http.get('http://127.0.0.1:3000/health',res=>process.exit(res.statusCode===200?0:1));req.on('error',()=>process.exit(1));req.setTimeout(2000,()=>{req.destroy();process.exit(1);});\""]
      interval: 30s
      timeout:  10s
      retries:  3
      start_period: 40s

  # ── Frontend ──────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: orcamentos-frontend
    restart: unless-stopped
    depends_on:
      - backend

  # ── Nginx ─────────────────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: orcamentos-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/${NGINX_CONF:-nginx.local.conf}:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - backend
      - frontend
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1/health || exit 1"]
      interval: 30s
      timeout:  10s
      retries:  3

volumes:
  postgres_data:
  redis_data:

networks:
  default:
    name: orcamentos-network
